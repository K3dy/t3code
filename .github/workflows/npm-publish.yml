name: Build t3code

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (tag, branch, or commit)"
        required: false
        default: "main"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            curl \
            ca-certificates \
            openssl \
            python3 \
            build-essential

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22.12.0"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Verify versions
        run: |
          node -v
          npm -v
          bun -v

      - name: Install Codex CLI
        run: npm install -g @openai/codex

      - name: Clone t3code
        run: git clone https://github.com/pingdotgg/t3code.git /opt/t3code

      - name: Checkout requested ref
        working-directory: /opt/t3code
        run: |
          REF="${{ github.event.inputs.ref || 'main' }}"
          git fetch --tags --force
          git checkout "$REF"

      - name: Install dependencies
        working-directory: /opt/t3code
        run: bun install

      - name: Build
        working-directory: /opt/t3code
        run: bun run build
